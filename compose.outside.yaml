# Use this file when running `docker compose` from outside the repository folder.
# Example:
#   APP_ROOT=/absolute/path/to/procurement-agent docker compose -f /absolute/path/to/procurement-agent/compose.outside.yaml up --build

services:
  web:
    build:
      context: ${APP_ROOT:-/Users/edmilsonbalango/procurement-agent}
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://api:3001
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://api:3001
    depends_on:
      - api
    ports:
      - 3000:3000

  api:
    build:
      context: ${APP_ROOT:-/Users/edmilsonbalango/procurement-agent}
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: http://localhost:3000,http://web:3000
      MYSQL_HOST: ${MYSQL_HOST:-host.docker.internal}
      MYSQL_PORT: ${MYSQL_PORT:-3306}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Karingani@1}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-procuremes-agent-test}
      MYSQL_CONNECTION_LIMIT: ${MYSQL_CONNECTION_LIMIT:-10}
    extra_hosts:
      - host.docker.internal:host-gateway
    expose:
      - 3001
